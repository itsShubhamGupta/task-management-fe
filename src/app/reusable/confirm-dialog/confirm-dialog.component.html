@if (visible) {
<div class="modal-backdrop">
  <div class="modal-container">
    <h3>{{ title }}</h3>

    <p>{{ message }}</p>

    <div class="actions">
      <button class="btn-cancel" (click)="onCancel()">
        Cancel
      </button>

      <button class="btn-delete" (click)="onConfirm()">
        Delete
      </button>
    </div>
  </div>
</div>
}
